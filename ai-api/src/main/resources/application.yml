# 파일: application.yml
# 역할: ai-api 기본 설정
# 설명: 공통 설정 + 프로필별 설정 분기

server:
  port: 8081  # backend-api(8080)와 다른 포트

spring:
  application:
    name: ai-api

  profiles:
    active: dev  # 기본 프로필: dev (zero-cost)

  # Jackson 설정
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# 로깅 설정
logging:
  level:
    root: INFO
    com.mindcompass.ai: DEBUG
    org.springframework.ai: INFO

---
# ========================================
# dev 프로필 (기본)
# - OpenAI 호출 없음
# - 모든 AI 기능이 fallback으로 동작
# - 개발/테스트 시 비용 발생 안 함
# ========================================
spring:
  config:
    activate:
      on-profile: dev

  # Spring AI 비활성화 (autoconfigure 스킵)
  ai:
    openai:
      api-key: ""  # 빈 값 - ChatClient Bean 생성 안 됨

logging:
  level:
    com.mindcompass.ai: DEBUG
    com.mindcompass.ai.prompt: DEBUG

---
# ========================================
# manual 프로필
# - 실제 OpenAI 호출
# - API 키 필수
# - 비용 발생 주의
# ========================================
spring:
  config:
    activate:
      on-profile: manual

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}  # 환경 변수에서 읽음
      chat:
        options:
          model: gpt-4o-mini  # 비용 효율적인 모델
          temperature: 0.7
          max-tokens: 1000

logging:
  level:
    com.mindcompass.ai: INFO
    org.springframework.ai: DEBUG
